// Apply the java-library plugin to add support for Java Library
//apply plugin: 'java'
apply plugin: 'groovy'


// In this section you declare where to find the dependencies of your project
repositories {
    // Use jcenter for resolving your dependencies.
    // You can declare any Maven/Ivy/file repository here.
    mavenCentral()
    mavenLocal()
    jcenter()
    maven {
        url "https://oss.sonatype.org/content/repositories/snapshots"
		// url "https://oss.sonatype.org/content/repositories/releases"
    }
}

compileGroovy {
    groovyOptions.configurationScript = file("gradle/config.groovy")
}

dependencies {
    implementation 'org.codehaus.groovy:groovy-all:2.4.12'
    implementation 'org.apache.ivy:ivy:2.5.0'
    //groovy group: 'org.apache.ivy', name:'ivy', version:'2.2.0'
    //implementation 'org.codehaus.groovy:groovy-all:2.4.12'
    implementation 'com.newscores:setTheory:2.0.4-SNAPSHOT'
    implementation 'com.newscores:notation:1.1.0-SNAPSHOT'
    implementation 'org.apache.commons:commons-lang3:3.0'
}

task runTest (type: JavaExec) {
    main = 'Test'
    classpath = sourceSets.main.runtimeClasspath
}

task runEmbeddedRows (type: JavaExec) {
	standardInput = System.in
    main = 'EmbeddedRows'
    classpath = sourceSets.main.runtimeClasspath
}

task runCoolRows (type: JavaExec) {
    standardInput = System.in
    main = 'FindCoolRows'
    classpath = sourceSets.main.runtimeClasspath
}

task runGlassWork (type: JavaExec) {
    standardInput = System.in
    main = 'GlassWork'
    classpath = sourceSets.main.runtimeClasspath
}

task runTransformationWork (type: JavaExec) {
    standardInput = System.in
    main = 'TransformationWork'
    classpath = sourceSets.main.runtimeClasspath
}

task runRows (type: JavaExec) {
	standardInput = System.in
    main = 'Rows'
    classpath = sourceSets.main.runtimeClasspath
}

task runRowScratch (type: JavaExec) {
    standardInput = System.in
    main = 'RowScratch'
    classpath = sourceSets.main.runtimeClasspath
}

task runRowTests (type: JavaExec) {
	standardInput = System.in
    main = 'RowTests'
    classpath = sourceSets.main.runtimeClasspath
}

task runCM (type: JavaExec) {
	standardInput = System.in
    main = 'CM'
    classpath = sourceSets.main.runtimeClasspath
}

task runQuickTour (type: JavaExec) {
    main = 'QuickTour'
    classpath = sourceSets.main.runtimeClasspath
}

task runTestTransString (type: JavaExec) {
    main = 'TestTransString'
    classpath = sourceSets.main.runtimeClasspath
}

task runScales (type: JavaExec) {
    main = 'Scales'
    classpath = sourceSets.main.runtimeClasspath
}